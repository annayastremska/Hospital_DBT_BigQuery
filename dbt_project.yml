name: 'hospital_dbt_bigquery'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  hospital_dbt_bigquery:
    +schema: raw

models:
  hospital_dbt_bigquery:
    stg:
      +schema: staging
      +materialized: view
    mart:
      +schema: marts
      +materialized: table

tests:
  +store_failures: true
  +schema: stg      